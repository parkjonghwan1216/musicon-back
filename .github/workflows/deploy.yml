name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o musicon-server ./cmd/server

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binary and migrations
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key musicon-server ubuntu@$HOST:~/musicon-server-new
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "mkdir -p ~/musicon-migrations"
          scp -i ~/.ssh/deploy_key migrations/*.sql ubuntu@$HOST:~/musicon-migrations/

      - name: Deploy and restart
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "\
            sudo systemctl stop musicon && \
            sudo cp ~/musicon-server-new /opt/musicon/musicon-server && \
            sudo chmod +x /opt/musicon/musicon-server && \
            sudo cp ~/musicon-migrations/*.sql /opt/musicon/migrations/ && \
            sudo mkdir -p /opt/musicon/logs && \
            sudo chown -R musicon:musicon /opt/musicon && \
            sudo systemctl start musicon && \
            rm -rf ~/musicon-server-new ~/musicon-migrations && \
            sleep 3 && \
            curl -sf localhost:7847/health && \
            echo 'Deploy successful'"
