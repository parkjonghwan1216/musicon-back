name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -o musicon-server ./cmd/server

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          scp -i ~/.ssh/deploy_key musicon-server ubuntu@$HOST:~/musicon-server-new

          ssh -i ~/.ssh/deploy_key ubuntu@$HOST << 'EOF'
            sudo systemctl stop musicon
            sudo cp ~/musicon-server-new /opt/musicon/musicon-server
            sudo chmod +x /opt/musicon/musicon-server
            sudo chown musicon:musicon /opt/musicon/musicon-server
            sudo systemctl start musicon
            rm ~/musicon-server-new
            sleep 2
            curl -sf localhost:7847/health || exit 1
            echo "Deploy successful"
          EOF
